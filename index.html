<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos | Landing Pages</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #0A1118;
            --color-text: #FFFFFF;
            --color-accent: #C4B28C;
            --color-muted: #8CA3BC;
            --font-family: 'Montserrat', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--color-bg);
            background-image: radial-gradient(circle at top, #182330 0%, #0A1118 70%);
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
            color: var(--color-text);
        }

        p {
            color: var(--color-muted);
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 400px;
        }

        a {
            display: block;
            text-decoration: none;
            color: var(--color-text);
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            padding: 1.5rem;
            border: 1px solid rgba(140, 163, 188, 0.15);
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(24, 35, 48, 0.3);
        }

        a:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
            transform: translateY(-2px);
            background: rgba(196, 178, 140, 0.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-accent);
            transition: width 0.3s ease;
        }

        a:hover::before {
            width: 100%;
        }

        footer {
            margin-top: 4rem;
            font-size: 0.7rem;
            color: var(--color-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1>Projetos</h1>
        <p>Landing Pages Imóveis</p>
    </header>

    <nav>
        <a href="arenis/arenis.html">Arenis</a>
        <a href="vertice/vertice.html">Vértice</a>
    </nav>

    <footer>
        &copy; 2026. Todos os direitos reservados.
    </footer>

</body>
</html>
